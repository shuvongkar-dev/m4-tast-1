<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kung fu panda</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header></header>
    <main>
      <hr>
      <form action="" class="search-container">
        <label for="search">Search your Image here:</label>
        <input
          type="search"
          name="search"
          id="search"
          placeholder="Search for an image"
        />
        <button>Search</button>
      </form>
      <section class="image-section">
        <img src="./images/nitto.jpg" alt="nitto" height="300px" width="300px" />
        <a href="www.google.com">For more click here</a>
      </section>
      <hr>
    </main>
    <footer>
      <form action="" id="feedback-form">
        <h2>Feedback Form:</h2>
        <label for="name">Name:</label>
        <input type="text" name="name" id="name" placeholder="Input Your Name">
        <label for="date">Date:</label>
        <input type="date" name="date" id="date">
        <label for="comment">Comment:</label>
        <textarea name="comment" id="comment" placeholder="Enter your feedback"></textarea>
        <button type="submit" id="form-btn">Submit</button>
      </form>
    </footer>
  </body>
</html>
